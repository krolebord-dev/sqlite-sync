name: PR Checks

on:
  pull_request:

jobs:
  checks:
    name: Format & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format --check

      - name: Typecheck
        run: pnpm typecheck
